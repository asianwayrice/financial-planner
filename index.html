<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Message</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4; /* Light grey background */
            font-family: 'Segoe UI', sans-serif;
        }

        .big-text {
            font-size: 8rem; /* Very large letters */
            font-weight: 900;
            color: #004d2c; /* That POLAHS forest green */
            text-align: center;
            text-transform: uppercase;
            letter-spacing: -5px;
            line-height: 0.9;
            padding: 20px;
        }

        /* Makes text responsive so it doesn't break on mobile */
        @media (max-width: 768px) {
            .big-text {
                font-size: 4rem;
                letter-spacing: -2px;
            }
        }
    </style>
</head>
<body>

    <div class="big-text">
        392 S Miraleste Dr #493
    </div>

</body>
</html>
